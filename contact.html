<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Ilham Karim</title>
    <style>
        /* Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        body, html {
            height: 100%;
            margin: 0;
            background-color: #000;
            overflow: hidden;
        }

        /* --- BACKGROUND IMAGE UPDATED --- */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Menggunakan direct link dari ID file Drive Anda */
            background: url('https://lh3.googleusercontent.com/d/1aX3WyZb5K8XSm0PhwIKE9WRWrZ_BaNsO') no-repeat center center;
            background-size: cover; /* Memastikan gambar memenuhi layar (fit) */
            z-index: -1;
        }

        /* --- HEADER OVERLAY --- */
        header { 
            position: absolute; top: 0; left: 0; width: 100%; padding: 40px 5%; 
            display: flex; justify-content: space-between; align-items: center; z-index: 10; 
        }
        .logo a { text-decoration: none; color: #fff; font-size: 1.2rem; font-weight: bold; }
        nav ul { list-style: none; display: flex; gap: 20px; }
        nav ul li a { text-decoration: none; color: rgba(255,255,255,0.7); font-size: 0.85rem; transition: 0.3s; }
        nav ul li a.active, nav ul li a:hover { color: #fff; }

        /* --- CONTACT CONTENT LAYOUT --- */
        .contact-wrapper {
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            padding: 10% 15%;
            position: relative;
            z-index: 2;
        }

        .contact-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #fff;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.8); /* Shadow diperkuat agar teks terbaca di atas gambar */
        }

        .inquiries { align-items: flex-start; padding-top: 120px; }
        .social { align-items: flex-end; padding-top: 120px; }
        .collective { grid-column: span 2; align-items: center; justify-content: flex-start; padding-top: 40px; }

        h3 { font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 20px; font-weight: normal; opacity: 0.9; }
        p, a { font-size: 0.9rem; color: #fff; text-decoration: none; margin-bottom: 5px; transition: opacity 0.3s; }
        a:hover { opacity: 0.7; }

        /* --- FOOTER LAYOUT --- */
        footer { 
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px 8%; 
            display: flex; justify-content: space-between; align-items: flex-end; 
            z-index: 10;
        }

        .footer-left {
            flex: 1;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.8);
            line-height: 1.6;
            text-align: left;
        }

        .footer-center {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .footer-right { flex: 1; }

        .instagram-icon {
            width: 22px;
            height: 22px;
            fill: #fff;
            transition: 0.3s;
        }
        .instagram-icon:hover { opacity: 0.6; }

        /* --- ANIMASI --- */
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        .contact-wrapper { animation: fadeIn 2s ease-in; }

        /* Responsive */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; padding: 20px 5%; }
            .contact-wrapper { grid-template-columns: 1fr; padding: 25% 10%; text-align: center; }
            .inquiries, .social, .collective { align-items: center; padding: 20px 0; }
            footer { flex-direction: column; align-items: center; text-align: center; gap: 20px; }
            .footer-left { order: 2; }
            .footer-center { order: 1; }
        }
    </style>
</head>
