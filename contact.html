<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ilham karim | contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <style>
        /* Typography: Helvetica Stack */
        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #000;
        }

        /* Hero Background Setup */
        .hero-bg {
            /* Background menggunakan link gambar terakhir dari diskusi kita */
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://lh3.googleusercontent.com/d/1aX3WyZb5K8XSm0PhwIKE9WRWrZ_BaNsO');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Nav Glassmorphism on Mobile */
        @media (max-width: 767px) {
            #nav-menu.active {
                background: rgba(0, 0, 0, 0.9);
                backdrop-filter: blur(10px);
                display: flex !important;
            }
        }
    </style>
</head>
<body class="antialiased text-white">

    <div class="hero-bg">
        <!-- Navigation -->
        <nav class="relative w-full z-50 px-6 py-8 md:px-12 flex justify-between items-center">
            <div class="text-xl md:text-2xl font-medium tracking-tight">
                <a href="index.html">Ilham Karim</a>
            </div>

            <button id="menu-btn" class="block md:hidden z-50 focus:outline-none">
                <div id="line1" class="w-6 h-0.5 bg-white mb-1.5 transition-all"></div>
                <div id="line2" class="w-6 h-0.5 bg-white transition-all"></div>
            </button>

            <div id="nav-menu" class="hidden md:flex gap-6 md:gap-8 text-[11px] md:text-[13px] font-light tracking-wide transition-all duration-500 fixed inset-0 md:relative md:inset-auto flex-col md:flex-row justify-center items-center md:bg-transparent">
                <a href="about.html" class="hover:opacity-60 transition">About</a>
                <a href="artwork.html" class="hover:opacity-60 transition">Artworks</a>
                <a href="exhibition.html" class="hover:opacity-60 transition">Exhibition</a>
                <a href="articles.html" class="hover:opacity-60 transition">Project</a>
                <a href="contact.html" class="opacity-100 font-medium">Contact</a>
            </div>
        </nav>

        <!-- Contact Content (Grid Layout) -->
        <div class="flex-grow flex items-center justify-center px-12" data-aos="fade-in" data-aos-duration="2000">
            <div class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-2 gap-y-16 text-center md:text-left">
                
                <!-- Inquiries -->
                <div class="flex flex-col items-center md:items-start" data-aos="fade-up" data-aos-delay="200">
                    <h3 class="text-[10px] tracking-[0.2em] opacity-60 mb-6 uppercase">Inquiries</h3>
                    <p class="text-[14px] font-light">ilhamkarim999@gmail.com</p>
                    <p class="text-[14px] font-light opacity-80">Yogyakarta, ID</p>
                </div>

                <!-- Social Media -->
                <div class="flex flex-col items-center md:items-end" data-aos="fade-up" data-aos-delay="400">
                    <h3 class="text-[10px] tracking-[0.2em] opacity-60 mb-6 uppercase">Social Media</h3>
                    <a href="https://instagram.com/namaku.karim" target="_blank" class="text-[14px] font-light hover:opacity-50 transition">@namaku.karim</a>
                    <a href="https://instagram.com/lab.namaku" target="_blank" class="text-[14px] font-light hover:opacity-50 transition">@lab.namaku</a>
                </div>

                <!-- Collective (Centered Bottom) -->
                <div class="md:col-span-2 flex flex-col items-center mt-8" data-aos="fade-up" data-aos-delay="600">
                    <h3 class="text-[10px] tracking-[0.2em] opacity-60 mb-6 uppercase">Collective</h3>
                    <a href="https://instagram.com/tikumforum" target="_blank" class="text-[14px] font-light hover:opacity-50 transition">@tikumforum</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Minimalist -->
    <footer class="absolute bottom-0 w-full p-8 md:px-12 flex flex-col md:flex-row justify-between items-center gap-4 bg-transparent">
        <div class="flex items-center gap-2 opacity-60">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M15 9.5c-.3-.5-.8-.8-1.5-.8-1.1 0-2 .9-2 2s.9 2 2 2c.7 0 1.2-.3 1.5-.8"/>
            </svg>
            <span class="text-[10px]">2026 Ilham Karim</span>
        </div>
        <div class="opacity-40 text-[9px] uppercase tracking-widest">
            Powered By Geri
        </div>
    </footer>

    <script>
        // AOS Animation
        AOS.init({ once: true });

        // Mobile Menu Logic
        const menuBtn = document.getElementById('menu-btn');
        const navMenu = document.getElementById('nav-menu');
        const line1 = document.getElementById('line1');
        const line2 = document.getElementById('line2');

        menuBtn.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            line1.classList.toggle('rotate-45');
            line1.classList.toggle('translate-y-1');
            line2.classList.toggle('-rotate-45');
            line2.classList.toggle('-translate-y-1');
            
            if (navMenu.classList.contains('active')) {
                navMenu.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            } else {
                navMenu.style.display = '';
                document.body.style.overflow = 'auto';
            }
        });
    </script>
</body>
</html>
