    <style>
        /* Base Styles & Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background-color: #fff; color: #333; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

        /* --- HEADER OVERLAY (Konsisten dengan About/Contact) --- */
        header { 
            position: absolute; top: 0; left: 0; width: 100%; padding: 40px 5%; 
            display: flex; justify-content: space-between; align-items: center; z-index: 10; 
        }
        .logo a { text-decoration: none; color: #555; font-size: 1.2rem; }
        nav ul { list-style: none; display: flex; gap: 20px; }
        nav ul li a { text-decoration: none; color: #888; font-size: 0.85rem; transition: 0.3s; }
        nav ul li a.active, nav ul li a:hover { color: #000; }

        /* --- ANIMASI PAGE LOAD --- */
        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container { 
            flex: 1; 
            padding: 140px 10% 60px; /* Padding top ditambah karena header absolute */
            display: flex; 
            justify-content: center;
            animation: fadeInPage 1s ease-out forwards;
        }

        /* Artwork Grid */
        .artwork-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            border-top: 1px solid #ddd; 
            border-left: 1px solid #ddd; 
            max-width: 1000px; 
            width: 100%; 
        }
        .grid-item { 
            border-right: 1px solid #ddd; 
            border-bottom: 1px solid #ddd; 
            padding: 15px; 
            aspect-ratio: 1 / 1; 
            cursor: pointer;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .grid-item img { width: 100%; height: 100%; object-fit: contain; transition: 0.5s ease; }
        .grid-item:hover img { transform: scale(1.08); }

        /* --- LIGHTBOX & ZOOM ANIMATION --- */
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .lightbox-content {
            position: relative;
            max-width: 85%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: zoomIn 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .lightbox-content img { max-width: 100%; max-height: 60vh; object-fit: contain; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Lightbox Info (Gray Bar) */
        .lightbox-info {
            background-color: #f0f0f0;
            width: 100vw;
            padding: 30px 10%;
            position: absolute;
            bottom: -160px;
            color: #000;
            text-align: left;
            border-top: 1px solid #ddd;
        }
        .info-title { font-weight: bold; margin-bottom: 5px; font-size: 1rem; }
        .info-specs { font-size: 0.85rem; color: #333; margin-bottom: 10px; }
        .exhibition-history { font-size: 0.8rem; line-height: 1.5; color: #555; }

        /* Navigation Controls */
        .close { position: absolute; top: -50px; right: 0; font-size: 35px; cursor: pointer; color: #333; }
        .prev, .next {
            position: absolute;
            top: 40%;
            transform: translateY(-50%);
            font-size: 40px;
            color: #ccc;
            cursor: pointer;
            user-select: none;
            padding: 20px;
            transition: 0.3s;
        }
        .prev { left: -100px; }
        .next { right: -100px; }
        .prev:hover, .next:hover { color: #000; }

        /* Footer */
        footer {
            padding: 60px 8% 40px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 0.75rem;
            color: #aaa;
        }
        .footer-left { text-align: left; line-height: 1.6; }
        .footer-center { position: absolute; left: 50%; transform: translateX(-50%); }
        .instagram-icon { width: 20px; fill: #333; }

        /* Responsive Settings */
        @media (max-width: 1024px) {
            .prev { left: -50px; }
            .next { right: -50px; }
        }
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; padding: 20px 5%; }
            .container { padding-top: 120px; }
            .artwork-grid { grid-template-columns: repeat(2, 1fr); }
            .prev, .next { display: none; }
            .lightbox-info { padding: 20px 5%; bottom: -180px; }
            .footer-center { position: static; transform: none; margin: 20px 0; }
            footer { flex-direction: column; align-items: center; }
        }
        .artsy-logo-link {
            display: inline-block;
            transition: transform 0.3s ease, opacity 0.3s ease;
            text-decoration: none;
        }

        /* Ukuran logo gambar */
        .artsy-logo-img {
            width: 35px; /* Anda bisa menyesuaikan lebar ini */
            height: auto;
            display: block;
        }

        /* Efek Hover (Saat kursor di atas gambar) */
        .artsy-logo-link:hover {
            transform: scale(1.05); /* Sedikit membesar */
            opacity: 0.8; /* Sedikit memudar untuk efek interaktif */
        }

        /* Pengaturan posisi di tengah layar */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            gap: 15px;
        }

        .sub-text {
            font-family: 'Helvetica', sans-serif;
            font-size: 14px;
            color: #333;
            letter-spacing: 1px;
        }
    </style>
</head>

    <script>
        // DATA ARTIWORK (Silakan edit teks ini sesuai urutan gambar)
        const artworkData = [
            { title: "Behind The Blank Canvas Series: Manusia-Manusia_1", specs: "Acrylic on canvas | 100 x 100 cm | 2025", exhib: "Art Jakarta Gardens, Hutan Kota by Plataran, Jakarta." },
            { title: "Digital Soul #2", specs: "Oil on canvas | 120 x 90 cm | 2024", exhib: "National Gallery of Indonesia, Jakarta." },
            { title: "Fragmented Identity", specs: "Mixed media | 80 x 80 cm | 2025", exhib: "Jogja National Museum, Yogyakarta." },
            { title: "Virtual Space 04", specs: "Acrylic on canvas | 150 x 150 cm | 2024", exhib: "Sewu Satu Gallery, Jakarta." },
            { title: "Manusia-Manusia_5", specs: "Acrylic on canvas | 100 x 100 cm | 2025", exhib: "Art Jakarta Gardens, Jakarta." },
            { title: "Neon Reality", specs: "Oil and neon light | 100 x 120 cm | 2025", exhib: "UOB Painting of the Year Exhibition." },
            { title: "Cyber Landscape", specs: "Acrylic on canvas | 110 x 110 cm | 2024", exhib: "Gajah Gallery, Yogyakarta." },
            { title: "Floating Memory", specs: "Mixed media | 90 x 90 cm | 2025", exhib: "Taipei Art Fair, Taiwan." },
            { title: "The Red Suit", specs: "Acrylic on canvas | 130 x 100 cm | 2025", exhib: "Art Jakarta 2025." },
            { title: "Last Frame", specs: "Oil on canvas | 100 x 100 cm | 2024", exhib: "Final Project Exhibition, ISI Yogyakarta." }
            
        ];

        let currentSlideIndex = 0;
        const images = document.querySelectorAll('.grid-item img');
        const lightbox = document.getElementById("myLightbox");
        const lightboxImg = document.getElementById("lightboxImg");
        const lightboxContent = document.getElementById("lightboxContent");
        
        // Element teks lightbox
        const infoTitle = document.getElementById("infoTitle");
        const infoSpecs = document.getElementById("infoSpecs");
        const infoExhib = document.getElementById("infoExhib");

        function openLightbox(index) {
            currentSlideIndex = index;
            lightbox.style.display = "flex";
            lightboxContent.style.animation = 'none';
            lightboxContent.offsetHeight; 
            lightboxContent.style.animation = null; 
            updateLightbox();
        }

        function closeLightbox() {
            lightbox.style.display = "none";
        }

        function changeSlide(n) {
            currentSlideIndex += n;
            if (currentSlideIndex >= images.length) currentSlideIndex = 0;
            if (currentSlideIndex < 0) currentSlideIndex = images.length - 1;
            updateLightbox();
        }

        function updateLightbox() {
            lightboxImg.src = images[currentSlideIndex].src;
            // Update Teks Berdasarkan Array Data
            const data = artworkData[currentSlideIndex];
            infoTitle.innerText = data.title;
            infoSpecs.innerText = data.specs;
            infoExhib.innerHTML = `<strong>Exhibition:</strong> ${data.exhib}`;
        }

        window.onclick = function(event) {
            if (event.target == lightbox) closeLightbox();
        }
    </script>
