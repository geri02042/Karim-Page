<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project - Ilham Karim</title>
    <style>
        /* Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background-color: #fff; color: #333; line-height: 1.6; }

        /* Navigation */
        header { padding: 40px 8% 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo a { text-decoration: none; color: #444; font-size: 1.2rem; }
        nav ul { list-style: none; display: flex; gap: 20px; }
        nav ul li a { text-decoration: none; color: #888; font-size: 0.85rem; transition: 0.3s; }
        nav ul li a.active, nav ul li a:hover { color: #000; }

        /* Main Content */
        .container { padding: 40px 8% 100px; max-width: 1400px; margin: 0 auto; }
        
        .page-title { 
            font-size: 2.2rem; 
            font-weight: bold; 
            margin-bottom: 80px; 
            color: #333;
            letter-spacing: -0.5px;
        }

        /* Project Grid */
        .project-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px; 
        }

        .project-card {
            background-color: #383638; /* Warna abu-abu gelap sesuai referensi */
            aspect-ratio: 16 / 9;
            padding: 30px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            text-decoration: none;
            transition: transform 0.3s ease, background-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .project-card:hover {
            transform: translateY(-5px);
            background-color: #4a484a;
        }

        .project-card h2 {
            color: #fff;
            font-size: 1.4rem;
            font-weight: bold;
            line-height: 1.2;
            z-index: 2;
            max-width: 90%;
        }

        /* Footer */
        footer { 
            padding: 40px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            font-size: 0.75rem; 
            color: #aaa;
            border-top: 1px solid #f9f9f9;
        }
        .footer-left p { margin-bottom: 4px; }
        .social-icon { font-size: 1.2rem; color: #333; text-decoration: none; }

        /* Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container { animation: fadeInUp 0.8s ease-out; }

        /* Responsive */
        @media (max-width: 1024px) {
            .project-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .project-grid { grid-template-columns: 1fr; }
            .page-title { font-size: 1.8rem; margin-bottom: 40px; }
            header { flex-direction: column; gap: 20px; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="index.html">Ilham Karim</a></div>
        <nav>

                <li><a href="about.html">About</a></li>

                <li><a href="exhibition.html">Exhibition</a></li>
                <li><a href="project.html" class="active">Project</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">

            <!-- Project 1 -->
            <a href="#" class="project-card">
                <h2>Artopologi x<br>Queen City Mall</h2>
            </a>

            <!-- Project 2 -->
            <a href="#" class="project-card">
                <h2>Nawanata</h2>
            </a>

            <!-- Project 3 -->
            <a href="#" class="project-card">
                <h2>Titik Kumpul Forum<br>& Collective</h2>
            </a>

            <!-- Project 4 -->
            <a href="#" class="project-card">

            <!-- Project 5 -->
            <a href="#" class="project-card">

        </div>
    </main>

    <footer>
        <div class="footer-left">
            <p>© 2026 Ilham Karim</p>
            <p>Powered by Geri</p>
        </div>
        <div class="footer-right">
            <a href="#" class="social-icon"></a> <!-- Icon Instagram -->
        </div>
    </footer>

</body>
</html>
