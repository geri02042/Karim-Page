<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ilham karim | home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <style>
        /* Typography: Helvetica Stack */
        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Hero Background Setup */
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://lh3.googleusercontent.com/d/1dqrdHL9muTut1wYPz1VoGfUBKClpR7Ar');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Nav Glassmorphism on Mobile */
        @media (max-width: 767px) {
            #nav-menu.active {
                background: rgba(0, 0, 0, 0.9);
                backdrop-blur: 10px;
                display: flex !important;
            }
        }
    </style>
</head>
<body class="antialiased text-white">

    <div class="hero-bg">
        <!-- Navigation -->
        <nav class="relative w-full z-50 px-6 py-8 md:px-12 flex justify-between items-center">
            <!-- Logo Pojok Kiri Atas -->
            <div class="text-xl md:text-2xl font-medium tracking-tight">Ilham Karim</div>

            <!-- Hamburger Button (Mobile) -->
            <button id="menu-btn" class="block md:hidden z-50 focus:outline-none">
                <div id="line1" class="w-6 h-0.5 bg-white mb-1.5 transition-all"></div>
                <div id="line2" class="w-6 h-0.5 bg-white transition-all"></div>
            </button>

            <!-- Menu Links (Kanan Atas) -->
            <div id="nav-menu" class="hidden md:flex gap-6 md:gap-8 text-[11px] md:text-[13px] font-light tracking-wide transition-all duration-500 fixed inset-0 md:relative md:inset-auto flex-col md:flex-row justify-center items-center md:bg-transparent">
                <a href="about.html" class="hover:opacity-60 transition">About</a>
                <a href="artwork.html" class="hover:opacity-60 transition">Artworks</a>
                <a href="exhibition.html" class="hover:opacity-60 transition">Exhibition</a>
                <a href="articles.html" class="hover:opacity-60 transition">Project</a> <!-- Sesuai gambar: 'Projcet' -->
                <a href="contact.html" class="hover:opacity-60 transition">Contact</a>
            </div>
        </nav>

        <!-- Hero Content Center Left -->
        <div class="flex-grow flex items-center px-6 md:px-24">
            <div class="max-w-2xl" data-aos="fade-up" data-aos-duration="1500">
                <h1 class="text-5xl md:text-7xl font-medium tracking-tight mb-4">Ilham Karim</h1>
                <div class="space-y-1 text-[12px] md:text-[14px] font-light tracking-normal opacity-90">
                    <p><span class="font-bold">Visual artist</span> based in Yogyakarta, Indonesia</p>
                    <p>Part of Titik Kumpul Forum & Collective</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Minimalist -->
    <footer class="absolute bottom-0 w-full p-8 md:px-12 flex flex-col md:flex-row justify-between items-center gap-4 bg-transparent">
        <div class="flex items-center gap-2 opacity-60">
            <!-- SVG Copyright Icon -->
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M15 9.5c-.3-.5-.8-.8-1.5-.8-1.1 0-2 .9-2 2s.9 2 2 2c.7 0 1.2-.3 1.5-.8"/>
            </svg>
            <span class="text-[10px] uppercase tracking-widest">2026 ilham karim</span>
        </div>
        <div class="opacity-40 text-[9px] uppercase tracking-[0.3em]">
            powered by geri
        </div>
    </footer>

    <script>
        // AOS Animation
        AOS.init({ once: true });

        // Mobile Menu Logic
        const menuBtn = document.getElementById('menu-btn');
        const navMenu = document.getElementById('nav-menu');
        const line1 = document.getElementById('line1');
        const line2 = document.getElementById('line2');

        menuBtn.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            line1.classList.toggle('rotate-45');
            line1.classList.toggle('translate-y-1');
            line2.classList.toggle('-rotate-45');
            line2.classList.toggle('-translate-y-1');
            
            if (navMenu.classList.contains('active')) {
                navMenu.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            } else {
                navMenu.style.display = '';
                document.body.style.overflow = 'auto';
            }
        });
    </script>
</body>
</html>
