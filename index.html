<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIM | Visual Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #1a1a1a; scroll-behavior: smooth; }
        
        .art-grid { column-count: 2; column-gap: 1rem; }
        @media (min-width: 768px) { .art-grid { column-count: 3; column-gap: 1.5rem; } }
        
        .art-item { 
            break-inside: avoid; margin-bottom: 1rem; cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            position: relative; background: #f8f8f8; border-radius: 4px; overflow: hidden;
        }
        .art-item:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        /* Modal Fit logic */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); z-index: 100; overflow-y: auto;
        }
        #modal.active { display: flex; animation: fadeIn 0.3s ease; justify-content: center; align-items: center; }
        
        /* Memastikan gambar fit di layar laptop/HP */
        .modal-content-img {
            max-height: 70vh; /* Gambar maksimal 70% dari tinggi layar */
            width: auto;
            object-fit: contain;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="antialiased">

    <!-- Header -->
    <nav class="fixed w-full z-50 px-6 py-6 md:px-12 md:py-8 flex justify-between items-center mix-blend-difference text-white">
        <div class="font-bold tracking-tighter text-xl uppercase">Karim.</div>
        <a href="https://instagram.com/namaku.karim" target="_blank" class="text-[10px] uppercase tracking-widest font-bold border-b border-white pb-1">Instagram</a>
    </nav>

    <main class="pt-32 md:pt-40 px-6 md:px-12 pb-20">
        <header class="max-w-2xl mb-16 md:mb-24" data-aos="fade-up">
            <p class="text-lg md:text-2xl leading-relaxed text-gray-400 italic font-light mb-4">
                "a man at the intersection of reality and its deconstruction"
            </p>
            <div class="h-px w-16 bg-gray-200"></div>
        </header>

        <div class="art-grid" id="galleryContainer"></div>
    </main>

    <!-- Modal Lightbox Optimized -->
    <div id="modal" onclick="closeModal()">
        <div class="max-w-5xl w-full p-6 flex flex-col items-center gap-6 md:gap-8" onclick="event.stopPropagation()">
            <img id="modalImg" src="" class="modal-content-img rounded-sm shadow-xl">
            
            <div class="text-center max-w-2xl">
                <h2 id="modalTitle" class="text-2xl md:text-4xl font-bold italic tracking-tighter text-gray-900 leading-tight mb-2"></h2>
                <div class="h-px w-8 bg-black mx-auto mb-4"></div>
                <p class="text-gray-500 text-xs md:text-sm leading-relaxed mb-6"></p>
                <button onclick="closeModal()" class="text-[9px] uppercase tracking-[0.3em] font-black bg-black text-white px-8 py-3 rounded-full hover:bg-gray-800 transition">Close</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="p-12 md:p-20 border-t border-gray-50 text-center bg-zinc-50">
        <p class="text-[10px] md:text-[11px] text-gray-400 uppercase tracking-[0.4em] font-medium">
            2026 Create By <span class="text-black font-bold">Geri's</span>
        </p>
    </footer>

    <script>
        const myWorks = [
            { id: "18DCibzbe8MotTf8XuWQQxRTzUFoq7dzU", title: "Karya 1" },
            { id: "1xYXrfwQ8r3IfWhVgAfc7SQ19LazD0B0k", title: "Karya 2" },
            { id: "1NkJTNlyLJ_I9Lih8dnDC4EikZDKBvaXR", title: "Karya 3" },
            { id: "1Yl3M7VLFpDCBl0t8iz4puRvYF0VM7oRG", title: "Karya 4" },
            { id: "1qWuY3Rk1c9t31yVXhAnqp182bG3sBnH2", title: "Karya 5" },
            { id: "1RBcgHoAUUMV-H7r0uh4ng3yZydmUQ3Iv", title: "Karya 6" },
            { id: "1KhBTsroEPp6HxKZ3JKPwJ4gDcJ8tEI65", title: "Karya 7" },
            { id: "1-ic82Y1UfrJ5iBlo3Qv-h8Kboh-hilw6", title: "Karya 8" },
            { id: "14L_O_ZCYsOY3_3jDrjMJ0qU1S3TJDbKd", title: "Karya 9" },
            { id: "18Fk5np5T3zdd6jIipzVTNof4PNVLgUFS", title: "Karya 10" }
        ];

        const container = document.getElementById('galleryContainer');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImg');
        const modalTitle = document.getElementById('modalTitle');

        myWorks.forEach((work, index) => {
            const directLink = `https://lh3.googleusercontent.com/d/${work.id}`;
            const item = document.createElement('div');
            item.className = 'art-item';
            item.setAttribute('data-aos', 'fade-up');
            item.setAttribute('data-aos-delay', (index % 3) * 100);
            item.innerHTML = `<img src="${directLink}" alt="${work.title}" class="w-full h-auto">`;
            item.onclick = () => openModal(directLink, work.title);
            container.appendChild(item);
        });

        function openModal(src, title) {
            modalImg.src = src;
            modalTitle.innerText = title;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        AOS.init({ duration: 1000, once: true });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    </script>
</body>
</html>
